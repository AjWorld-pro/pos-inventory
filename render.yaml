services:
  - type: web
    name: posify-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: false
    disk:
      name: posify-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
