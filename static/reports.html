<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POSIFY — Reports</title>
  <link rel="stylesheet" href="/css/main.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    .reports-grid { display:grid;grid-template-columns:1fr 1fr;gap:24px; }
    .chart-wrap { position:relative;height:260px; }
    .date-range { display:flex;align-items:center;gap:10px; }
    .kpi-row { display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px; }
    @media(max-width:900px){ .reports-grid{grid-template-columns:1fr;} .kpi-row{grid-template-columns:1fr 1fr;} }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="app-sidebar"></aside>
  <main class="main-content">
    <div class="topbar">
      <button class="mobile-menu-btn btn-icon" id="mobile-menu-btn">☰</button>
      <div class="topbar-title"><h1>Reports & Analytics</h1><p>Business performance overview</p></div>
      <div class="topbar-actions">
        <div class="date-range">
          <input type="date" class="form-control" id="date-from" style="width:150px" />
          <span style="color:var(--gray-400)">to</span>
          <input type="date" class="form-control" id="date-to" style="width:150px" />
          <button class="btn btn-primary btn-sm" onclick="loadByRange()">Apply</button>
        </div>
      </div>
    </div>

    <div class="page-content">
      <!-- KPI Cards -->
      <div class="kpi-row">
        <div class="stat-card"><div class="stat-icon gold">💰</div><div class="stat-info"><div class="stat-value" id="kpi-today">—</div><div class="stat-label">Today's Revenue</div></div></div>
        <div class="stat-card"><div class="stat-icon green">📈</div><div class="stat-info"><div class="stat-value" id="kpi-week">—</div><div class="stat-label">This Week</div></div></div>
        <div class="stat-card"><div class="stat-icon blue">📆</div><div class="stat-info"><div class="stat-value" id="kpi-month">—</div><div class="stat-label">This Month</div></div></div>
        <div class="stat-card"><div class="stat-icon green">🧾</div><div class="stat-info"><div class="stat-value" id="kpi-txns">—</div><div class="stat-label">Total Transactions</div></div></div>
      </div>

      <div class="reports-grid">
        <!-- Revenue Chart -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">📊 Revenue (Last 7 Days)</span>
            <div class="tab-nav" style="margin-bottom:0">
              <button class="tab-btn active" onclick="switchChart('week',this)">Week</button>
              <button class="tab-btn" onclick="switchChart('month',this)">Month</button>
            </div>
          </div>
          <div class="card-body"><div class="chart-wrap"><canvas id="revenue-chart"></canvas></div></div>
        </div>

        <!-- Top Products -->
        <div class="card">
          <div class="card-header"><span class="card-title">🏆 Top Selling Products</span></div>
          <div class="card-body" id="top-products-body">
            <div class="loading-center"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- Sales by Category -->
        <div class="card">
          <div class="card-header"><span class="card-title">🗂 Sales by Category</span></div>
          <div class="card-body"><div class="chart-wrap"><canvas id="category-chart"></canvas></div></div>
        </div>

        <!-- Transaction History -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">🧾 Transaction History</span>
            <span class="badge badge-green" id="txn-count-badge">0</span>
          </div>
          <div class="card-body" style="padding:0">
            <div class="table-wrapper">
              <table>
                <thead><tr><th>Receipt</th><th>Date</th><th>Items</th><th>Method</th><th>Total</th></tr></thead>
                <tbody id="txn-table-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/sidebar.js"></script>
<script>
requireAuth();
initSidebar('reports');

let revenueChartInst = null;
let categoryChartInst = null;

// Set default date range
const today = new Date();
const weekAgo = new Date(); weekAgo.setDate(today.getDate()-6);
document.getElementById('date-to').value = today.toISOString().split('T')[0];
document.getElementById('date-from').value = weekAgo.toISOString().split('T')[0];

async function loadReports() {
  try {
    const [overview, weekly, txnsRes] = await Promise.all([
      Api.getOverview(), Api.getWeeklyReport(), Api.getTransactions()
    ]);
    // KPIs
    document.getElementById('kpi-today').textContent = formatCurrency(overview.today.revenue);
    document.getElementById('kpi-week').textContent = formatCurrency(overview.week.revenue);
    document.getElementById('kpi-month').textContent = formatCurrency(overview.month.revenue);
    document.getElementById('kpi-txns').textContent = overview.total.transactions;
    document.getElementById('txn-count-badge').textContent = txnsRes.total;

    // Revenue chart
    buildRevenueChart(weekly.summary);

    // Transactions table
    renderTxnTable(txnsRes.transactions.slice(0,20));

    // Category + top products from transactions
    buildCategoryStats(txnsRes.transactions);
  } catch(e) { showToast('Error loading reports: '+e.message,'error'); }
}

function buildRevenueChart(data) {
  const ctx = document.getElementById('revenue-chart').getContext('2d');
  if (revenueChartInst) revenueChartInst.destroy();
  revenueChartInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(d=>new Date(d.date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})),
      datasets: [{
        label: 'Revenue ($)',
        data: data.map(d=>d.revenue),
        backgroundColor: 'rgba(5,150,105,0.15)',
        borderColor: '#059669',
        borderWidth: 2,
        borderRadius: 6,
        fill: true,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend:{display:false} },
      scales: {
        y: { beginAtZero:true, grid:{color:'rgba(0,0,0,0.04)'}, ticks:{callback:v=>'$'+v} },
        x: { grid:{display:false} }
      }
    }
  });
}

function buildCategoryStats(transactions) {
  const catSales = {};
  const productSales = {};
  transactions.forEach(t => {
    t.items.forEach(item => {
      catSales[item.category] = (catSales[item.category]||0) + item.subtotal;
      productSales[item.product_name] = (productSales[item.product_name]||0) + item.quantity;
    });
  });

  // Category doughnut chart
  const cats = Object.keys(catSales);
  const colors = ['#059669','#D97706','#3B82F6','#EF4444','#8B5CF6','#EC4899','#14B8A6','#F97316','#6366F1','#84CC16'];
  const ctx2 = document.getElementById('category-chart').getContext('2d');
  if (categoryChartInst) categoryChartInst.destroy();
  if (cats.length) {
    categoryChartInst = new Chart(ctx2, {
      type: 'doughnut',
      data: {
        labels: cats,
        datasets: [{ data: cats.map(c=>catSales[c].toFixed(2)), backgroundColor: colors.slice(0,cats.length), borderWidth: 2 }]
      },
      options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{position:'right', labels:{font:{size:12},padding:12}} } }
    });
  } else {
    document.getElementById('category-chart').parentElement.innerHTML = '<div class="empty-state" style="padding:40px"><div class="empty-state-icon">🗂</div><p>No sales data yet</p></div>';
  }

  // Top products
  const sorted = Object.entries(productSales).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const el = document.getElementById('top-products-body');
  if (!sorted.length) {
    el.innerHTML = '<div class="empty-state" style="padding:30px"><div class="empty-state-icon">🏆</div><p>No sales data yet</p></div>'; return;
  }
  const max = sorted[0][1];
  el.innerHTML = sorted.map(([name,qty],i)=>`
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:13px;font-weight:600;color:var(--gray-800)">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'  '} ${name}</span>
        <span style="font-size:12px;font-weight:700;color:var(--primary)">${qty} sold</span>
      </div>
      <div style="height:6px;background:var(--gray-100);border-radius:3px;overflow:hidden">
        <div style="height:100%;background:var(--primary);border-radius:3px;width:${(qty/max*100).toFixed(1)}%;transition:width 0.6s ease"></div>
      </div>
    </div>`).join('');
}

function renderTxnTable(txns) {
  const tbody = document.getElementById('txn-table-body');
  if (!txns.length) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:28px;color:var(--gray-400)">No transactions found</td></tr>'; return; }
  tbody.innerHTML = txns.map(t=>`
    <tr>
      <td><span style="font-family:monospace;font-size:12px;color:var(--primary);font-weight:600">${t.receipt_number}</span></td>
      <td style="font-size:12.5px">${formatDateTime(t.created_at)}</td>
      <td style="font-size:13px">${t.items.length} item${t.items.length!==1?'s':''}</td>
      <td><span class="badge badge-gray">${t.payment_method}</span></td>
      <td style="font-weight:700;color:var(--primary)">${formatCurrency(t.total)}</td>
    </tr>`).join('');
}

async function switchChart(period, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  try {
    const res = period==='week' ? await Api.getWeeklyReport() : await Api.getMonthlyReport();
    buildRevenueChart(res.summary);
  } catch(e) {}
}

async function loadByRange() {
  const start = document.getElementById('date-from').value;
  const end = document.getElementById('date-to').value;
  if (!start||!end) return;
  try {
    const { transactions } = await Api.getTransactions({ start, end });
    renderTxnTable(transactions.slice(0,20));
    buildCategoryStats(transactions);
    document.getElementById('txn-count-badge').textContent = transactions.length;
  } catch(e) { showToast('Error loading range','error'); }
}

loadReports();
</script>
</body>
</html>
